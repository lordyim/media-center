<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충현교회 미디어센터 통합신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; font-family: 'Pretendard', sans-serif; padding-bottom: 50px; }
        .container { max-width: 600px; margin-top: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-logo { text-align: center; margin-bottom: 25px; }
        .nav-pills .nav-link { color: #555; border-radius: 10px; margin-bottom: 10px; }
        .nav-pills .nav-link.active { background-color: #004a99; }
        .form-label { font-weight: 600; margin-top: 15px; color: #333; }
        .btn-submit { background-color: #004a99; border: none; padding: 12px; font-weight: bold; border-radius: 10px; }
        .admin-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <h2 style="color: #004a99; font-weight: bold;">충현교회 미디어센터</h2>
        <p class="text-muted">통합 사역 신청 시스템</p>
    </div>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" onclick="showForm('영상광고')">영상광고</button></li>
        <li class="nav-item"><button class="nav-link" onclick="showForm('영상제작')">영상제작</button></li>
        <li class="nav-item"><button class="nav-link" onclick="showForm('사진촬영')">사진촬영</button></li>
        <li class="nav-item"><button class="nav-link bg-light" onclick="showAdmin()">관리자</button></li>
    </ul>

    <div class="card p-4 shadow-sm" id="form-container">
        <h4 id="form-title" class="mb-4">영상광고 상영 의뢰</h4>
        <form id="mainForm">
            <div id="dynamic-fields">
                </div>
            
            <hr class="my-4">
            <button type="submit" class="btn btn-primary w-100 btn-submit">신청하기</button>
        </form>
    </div>

    <div id="admin-container" class="admin-section card p-4">
        <h4>사역 신청 관리 대시보드</h4>
        <div class="table-responsive">
            <table class="table table-hover mt-3">
                <thead class="table-light">
                    <tr><th>날짜</th><th>신청자</th><th>내용</th><th>상태</th></tr>
                </thead>
                <tbody id="admin-data">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // -----------------------------------------------------------
    // ⚠️ 아래 URL을 아까 복사한 구글 웹 앱 URL로 반드시 수정하세요!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxMN0qiIA5-xXQK6C1YLebkwdp9dT2t1a1iQitC4XI00AQtUfQNGE2fJnpn9_tGVPlRyw/exec";
    // -----------------------------------------------------------

    let currentType = '영상광고';

    function showForm(type) {
        currentType = type;
        document.getElementById('admin-container').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('form-title').innerText = type + " 의뢰 신청";
        renderFields(type);
    }

    function renderFields(type) {
        const container = document.getElementById('dynamic-fields');
        let html = `
            <div class="mb-3"><label class="form-label">1. 신청자(위원회/부서) 정보 *</label><input type="text" class="form-control" name="f1" required></div>
            <div class="mb-3"><label class="form-label">2. 담당자 연락처 *</label><input type="text" class="form-control" name="f2" required placeholder="010-0000-0000"></div>
        `;

        if (type === '영상광고') {
            html += `
                <div class="mb-3"><label class="form-label">3. 광고 제목(행사명)</label><input type="text" class="form-control" name="f3"></div>
                <div class="mb-3"><label class="form-label">4. 광고 내용 요약(50자 이내)</label><textarea class="form-control" name="f4"></textarea></div>
                <div class="mb-3"><label class="form-label">5. 시작일</label><input type="date" class="form-control" name="f5"></div>
            `;
        } else if (type === '영상제작') {
            html += `
                <div class="mb-3"><label class="form-label">3. 영상 종류</label>
                    <select class="form-select" name="f3"><option>사역 홍보</option><option>인터뷰/다큐</option><option>교육용</option></select>
                </div>
                <div class="mb-3"><label class="form-label">4. 주요 내용/기획안</label><textarea class="form-control" name="f4" rows="4"></textarea></div>
            `;
        } else if (type === '사진촬영') {
            html += `
                <div class="mb-3"><label class="form-label">3. 촬영 일시</label><input type="datetime-local" class="form-control" name="f3"></div>
                <div class="mb-3"><label class="form-label">4. 촬영 장소</label><input type="text" class="form-control" name="f4"></div>
            `;
        }
        container.innerHTML = html;
    }

    // 데이터 전송
    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const dataArray = Array.from(formData.values());
        
        if(!confirm("신청하시겠습니까?")) return;

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: currentType, data: dataArray })
            });
            alert("성공적으로 접수되었습니다!");
            e.target.reset();
        } catch (error) {
            alert("오류가 발생했습니다. 다시 시도해주세요.");
        }
    };

    function showAdmin() {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('admin-container').style.display = 'block';
        alert("관리자 화면은 시트 데이터를 실시간으로 불러오도록 연동됩니다.");
    }

    // 초기 실행
    showForm('영상광고');
</script>
</body>
</html>
